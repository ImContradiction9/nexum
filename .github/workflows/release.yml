name: Release

# ⚠️ PAUSADO (2026-06-01): o build na nuvem usa o Python 3.14 do
# actions/setup-python, que gera um Nexum.exe cujo python314.dll NÃO carrega em
# algumas máquinas ("Failed to load Python DLL ... LoadLibrary: módulo não
# encontrado"). Builds LOCAIS (build_installer.ps1 / publicar.ps1) funcionam.
# Enquanto não corrigirmos o runtime no CI, o disparo por tag fica DESLIGADO
# para o auto-update nunca puxar uma versão quebrada. Releases = locais.
#
# Para reativar: voltar o gatilho `push: tags: ['v*']` abaixo (e validar que o
# exe gerado abre numa máquina-alvo antes de confiar no auto-update).
on:
  workflow_dispatch:   # só manual, pela aba Actions do GitHub
  # push:
  #   tags:
  #     - 'v*'

permissions:
  contents: write   # necessário para criar releases

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Se a release dessa tag JÁ foi publicada com o instalador (ex: pelo
      # script local publicar.ps1), não rebuilda — evita asset duplicado.
      - name: A release já tem o instalador?
        id: check
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $names = ""
          try { $names = gh release view $env:GITHUB_REF_NAME --json assets -q '.assets[].name' 2>$null } catch {}
          # gh sai com codigo 1 quando a release ainda nao existe — isso e
          # esperado (vamos buildar). Zera o codigo pra nao derrubar o passo.
          $global:LASTEXITCODE = 0
          if ($names -match 'NexumSetup\.exe') {
            "exists=true" >> $env:GITHUB_OUTPUT
            Write-Host "Release ja tem NexumSetup.exe -> pulando build."
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
            Write-Host "Release ainda nao tem o instalador -> vai buildar."
          }
          exit 0

      - name: Setup Python
        if: steps.check.outputs.exists != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Instalar Inno Setup
        if: steps.check.outputs.exists != 'true'
        run: choco install innosetup --no-progress -y

      - name: Build exe + instalador
        if: steps.check.outputs.exists != 'true'
        shell: pwsh
        run: .\build_installer.ps1

      - name: Publicar a release
        if: steps.check.outputs.exists != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ver = $env:GITHUB_REF_NAME -replace '^v',''
          gh release create $env:GITHUB_REF_NAME "dist\NexumSetup.exe" `
            --title "Nexum $ver" --generate-notes
