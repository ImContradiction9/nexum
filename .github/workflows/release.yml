name: Release

# Build e publicação do instalador do Nexum.
#
# Causa do bug anterior: o actions/setup-python usa um build de Python próprio
# do GitHub cujo python3XX.dll não carregava em algumas máquinas
# ("Failed to load Python DLL"). Aqui instalamos o Python OFICIAL do python.org
# (idêntico ao build local que funciona) — assim o exe gerado é equivalente.
#
# Gatilhos:
#   - tag vX.Y.Z   -> release REAL (full). Ex: v1.0.5
#   - tag vtest-*  -> build de TESTE, publicada como PRERELEASE (o auto-update
#                     usa releases/latest, que ignora prerelease -> seguro testar)
#   - manual (workflow_dispatch) pela aba Actions
on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'vtest-*'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python 3.14 (python.org via choco) e TRAVAR a versão
        shell: pwsh
        run: |
          # O instalador .exe do python.org dava erro 1603 no runner (flaky).
          # O choco instala o MESMO Python oficial de forma confiável (em C:\Python314).
          choco install python --version=3.14.4 -y --no-progress
          # Localiza o python.exe (não confia no PATH — na v1.0.6 caiu pro 3.12 do runner).
          $cands = @(
            "C:\Python314\python.exe",
            "C:\Program Files\Python314\python.exe",
            "$env:LOCALAPPDATA\Programs\Python\Python314\python.exe"
          )
          $py = $cands | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $py) { Write-Error "Python 3.14 nao encontrado apos o choco"; exit 1 }
          $ver = (& $py --version) 2>&1 | Out-String
          Write-Host "Build Python: $py -> $($ver.Trim())"
          # GUARDA: só 3.14 produz exe que carrega nas máquinas. Senão FALHA o build
          # (melhor falhar do que publicar versão quebrada que se auto-instala).
          if ($ver -notmatch '3\.14') { Write-Error "Esperado Python 3.14, veio: $ver"; exit 1 }
          "NEXUM_PYTHON=$py" | Out-File $env:GITHUB_ENV -Append -Encoding ascii

      - name: Instalar Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build exe + instalador
        shell: pwsh
        run: .\build_installer.ps1

      - name: Publicar a release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ver = (Select-String -Path app/__init__.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $isTest = $env:GITHUB_REF_NAME -like 'vtest-*'
          $title  = if ($isTest) { "TESTE $($env:GITHUB_REF_NAME) (Nexum $ver)" } else { "Nexum $ver" }
          $ghArgs = @($env:GITHUB_REF_NAME, "dist\NexumSetup.exe", "--title", $title, "--generate-notes")
          if ($isTest) { $ghArgs += "--prerelease" }
          gh release create @ghArgs
